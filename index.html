<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nutriplan</title>

<link rel="stylesheet" href="styles.css">

</head>


<body>

<!-- LOGIN -->

<section id="login-page">

<div class="login-container">

<h1 class="logo">NUTRIPLAN</h1>
<p class="subtitle">Plan nutricional inteligente</p>

<input id="login-user" placeholder="Usuario">
<input id="login-pass" type="password" placeholder="Contraseña">

<button id="login-btn">Entrar</button>

<p id="login-error"></p>

</div>

</section>



<!-- APP -->

<section id="app-page">

<header class="topbar">

<h1>NUTRIPLAN</h1>

<button id="logout-btn">Salir</button>

</header>



<main class="dashboard">

<h2>Plan nutricional semanal</h2>

<div id="table-container"></div>

<button id="generate-plan">Generar nuevo plan</button>

</main>

</section>


<script src="script.js"></script>

</body>
</html>
