<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NUTRIPLAN</title>

<link rel="stylesheet" href="styles.css">

</head>


<body>



<!-- LOGIN -->

<div id="loginScreen">

<h1 class="logo">NUTRIPLAN</h1>

<p class="subtitle">Planificador nutricional inteligente</p>

<div class="loginBox">

<input id="user" type="text" placeholder="Usuario">

<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

</div>

</div>




<!-- APLICACIÓN PRINCIPAL -->

<div id="app">

<h1 class="logoMain">NUTRIPLAN</h1>

<input id="searchRecipe" placeholder="Buscar receta...">




<!-- TABLA NUTRICIONAL -->

<h2>Plan Nutricional Inteligente</h2>

<div id="nutritionTableContainer"></div>




<!-- BOTÓN GENERAR PLAN -->

<button class="generateBtn" onclick="generateNutritionTable()">

Generar nuevo plan nutricional

</button>



</div>




<!-- SCRIPT -->

<script src="script.js"></script>


</body>
</html>
