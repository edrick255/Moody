<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NutriApp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="glass box login-box">

    <h1 class="logo">NutriApp</h1>
    <p class="subtitle">Nutrición inteligente</p>

    <div class="input-group">
      <input id="user" placeholder=" " autocomplete="off">
      <label>Usuario</label>
    </div>

    <div class="input-group password-group">
      <input id="pass" type="password" placeholder=" ">
      <label>Contraseña</label>
      <span id="togglePass" class="eye">👁</span>
    </div>

    <button id="loginBtn" class="primary-btn">Entrar</button>
    <button id="registerBtn" class="ghost-btn">Crear cuenta</button>

    <p id="loginError" class="error-text"></p>

  </div>
</div>

<!-- APP -->
<div id="app" class="screen hidden">

<header>
  <h2>Dashboard NutriApp</h2>
  <button id="logoutBtn">Salir</button>
</header>

<!-- PERFIL -->
<section class="glass box">
  <h3>Perfil Nutricional</h3>

  <input id="edad" placeholder="Edad" type="number">
  <select id="sexo">
    <option value="">Sexo</option>
    <option value="hombre">Masculino</option>
    <option value="mujer">Femenino</option>
  </select>

  <input id="peso" placeholder="Peso (kg)" type="number">
  <input id="altura" placeholder="Altura (cm)" type="number">

  <button onclick="calcularIMC()">Calcular IMC</button>
  <p id="resultadoIMC"></p>
</section>

<!-- RECETAS -->
<section>
  <h3>Recetas</h3>
  <button id="addRecipe">+ Nueva receta</button>
  <div id="recipes" class="grid"></div>
</section>

<!-- PLAN -->
<section>
  <h3>Plan Nutricional</h3>
  <button id="generate">Generar menú IA</button>
  <table id="plan"></table>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
