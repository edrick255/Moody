<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NutriPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="login" class="screen active fade">
  <div class="glass box scale">
    <h1>NutriPro</h1>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button id="loginBtn">Entrar</button>
  </div>
</div>

<div id="app" class="screen hidden fade">

<header>
  <h2>Dashboard</h2>
  <button id="logoutBtn">Salir</button>
</header>

<section>
  <h3>Recetas</h3>
  <button id="addRecipe">+ Nueva</button>
  <div id="recipes" class="grid"></div>
</section>

<section>
  <h3>Plan Nutricional</h3>
  <button id="generate">Generar menú IA</button>
  <table id="plan"></table>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
